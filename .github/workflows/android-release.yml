name: Android Release

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run cap:sync

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: gradle-build
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee ../gradle-build.log

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/voice-calendar-${GITHUB_REF_NAME:-manual}-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-calendar-android-apk
          path: release/*.apk

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/*.apk \
              --title "声历 Android ${GITHUB_REF_NAME}" \
              --notes "Android APK built from ${GITHUB_SHA}. This debug-signed build is intended for device testing and review demos."
          fi
